<link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">

<style>
    .keuangan-wrapper {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        max-width: 100%;
        margin: 0 auto;
    }

    .keuangan-header {
        text-align: center;
        margin-bottom: 1.5rem;
        padding: 2rem 1rem;
        background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
        color: white;
        border-radius: 8px;
    }

    .keuangan-header h2 {
        margin: 0 0 0.5rem 0;
        font-size: 1.8rem;
        color: white !important;
    }

    .keuangan-header p {
        margin: 0;
        opacity: 0.9;
        font-size: 0.95rem;
    }

    .filter-section {
        margin-bottom: 1rem;
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
        align-items: center;
        padding: 0.75rem 1rem;
        background: #f8fafc;
        border-radius: 8px;
        border: 1px solid #e2e8f0;
    }

    .filter-section label {
        font-weight: 600;
        color: #334155;
    }

    .filter-section select {
        padding: 0.5rem 1rem;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        font-size: 0.9rem;
        background: white;
        cursor: pointer;
        min-width: 150px;
    }

    .filter-section select:focus {
        outline: none;
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .filter-info {
        margin-left: auto;
        font-size: 0.85rem;
        color: #64748b;
    }

    .saldo-awal-box {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.6rem 1rem;
        background: #eff6ff;
        border: 1px solid #bfdbfe;
        border-radius: 6px;
        margin-bottom: 1rem;
        font-size: 0.9rem;
        color: #1e40af;
    }

    #tabelKeuangan {
        width: 100% !important;
        font-size: 0.9rem;
    }

    #tabelKeuangan thead th {
        background: #1e3a5f;
        color: white;
        padding: 12px 10px;
        text-align: left;
        font-weight: 600;
    }

    #tabelKeuangan tbody td {
        padding: 12px 10px;
        vertical-align: middle;
        border-bottom: 1px solid #e5e7eb;
    }

    #tabelKeuangan tbody tr:hover {
        background-color: #eff6ff;
    }


    .btn-detail {
        display: inline-block;
        padding: 4px 12px;
        background: #2563eb;
        color: white !important;
        border-radius: 4px;
        font-size: 0.8rem;
        font-weight: 600;
        text-decoration: none;
        transition: background 0.2s;
    }

    .btn-detail:hover {
        background: #1e40af;
        text-decoration: none;
        color: white !important;
    }

    .text-right  { text-align: right  !important; }
    .text-center { text-align: center !important; }

    @media (max-width: 768px) {
        #tabelKeuangan { font-size: 0.8rem; }
        .filter-section { flex-direction: column; align-items: flex-start; }
        .filter-info { margin-left: 0; margin-top: 0.5rem; }
    }
</style>

<div class="keuangan-wrapper">
    <div class="keuangan-header">
        <h2>Keuangan Perkara</h2>
        <p>Rekapitulasi Penerimaan dan Pengeluaran Keuangan Perkara Pengadilan Agama Penajam</p>
    </div>

    <div class="filter-section">
        <label for="filterTahunKeuangan">Pilih Tahun:</label>
        <select id="filterTahunKeuangan"></select>
        <span class="filter-info" id="infoKeuangan">Memuat...</span>
    </div>

    <div id="saldoAwalBox" class="saldo-awal-box" style="display:none;">
        Saldo Awal Tahun: <strong id="saldoAwalNominal"></strong>
    </div>

    <div style="overflow-x:auto;">
        <table id="tabelKeuangan" class="display" style="width:100%">
            <thead>
                <tr>
                    <th class="text-center">No</th>
                    <th>Bulan</th>
                    <th class="text-right">Penerimaan (Rp)</th>
                    <th class="text-right">Pengeluaran (Rp)</th>
                    <th class="text-center">Detail</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>

<script>
    (function () {
        var API_URL = 'https://web-api.pa-penajam.go.id/api/keuangan-perkara';

        // Base URL Joomla — untuk meresolve path relatif (images/...) ke URL absolut
        var JOOMLA_BASE = 'https://www.pa-penajam.go.id/';

        var NAMA_BULAN = ['', 'Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni',
            'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];

        function formatRupiah(angka) {
            if (angka === null || angka === undefined) return '-';
            return 'Rp ' + Number(angka).toLocaleString('id-ID');
        }

        // Ubah path relatif menjadi URL absolut agar tidak terpengaruh lokasi halaman Joomla
        function resolveUrl(url) {
            if (!url || typeof url !== 'string') return null;
            if (url.startsWith('http://') || url.startsWith('https://')) return url;
            // Path relatif seperti "images/..." → prefix dengan base Joomla
            return JOOMLA_BASE + url.replace(/^\//, '');
        }

        // Isi opsi tahun secara dinamis: tahun berjalan sampai 2019
        (function populateTahun() {
            var sel = document.getElementById('filterTahunKeuangan');
            var currentYear = new Date().getFullYear();
            for (var y = currentYear; y >= 2019; y--) {
                var o = document.createElement('option');
                o.value = String(y);
                o.textContent = String(y);
                if (y === currentYear) o.selected = true;
                sel.appendChild(o);
            }
        })();

        // Buat elemen anchor secara DOM (aman dari XSS)
        function buatTombolDetail(url) {
            var fullUrl = resolveUrl(url);
            if (!fullUrl) return '-';
            var a = document.createElement('a');
            a.href = fullUrl;
            a.textContent = 'Detail';
            a.className = 'btn-detail';
            a.target = '_blank';
            a.rel = 'noopener';
            return a.outerHTML;
        }

        var table;

        function initTable(tahun) {
            if (table) table.destroy();

            document.getElementById('infoKeuangan').textContent = 'Memuat...';
            document.getElementById('saldoAwalBox').style.display = 'none';
            document.getElementById('saldoAwalNominal').textContent = '';

            table = $('#tabelKeuangan').DataTable({
                ajax: {
                    url: API_URL + '?tahun=' + encodeURIComponent(tahun),
                    dataSrc: function (json) {
                        var apiRows = json.data || [];

                        // Indeks data API berdasarkan nomor bulan untuk lookup O(1)
                        var dataByBulan = {};
                        for (var i = 0; i < apiRows.length; i++) {
                            dataByBulan[apiRows[i].bulan] = apiRows[i];
                        }

                        // Tampilkan saldo awal dari baris bulan=1
                        var bulan1 = dataByBulan[1];
                        if (bulan1 && bulan1.saldo_awal !== null && bulan1.saldo_awal !== undefined) {
                            document.getElementById('saldoAwalNominal').textContent = formatRupiah(bulan1.saldo_awal);
                            document.getElementById('saldoAwalBox').style.display = 'flex';
                        }

                        // Bangun 12 baris statis (Januari–Desember), isi dari API jika ada
                        var rows = [];
                        for (var b = 1; b <= 12; b++) {
                            rows.push(dataByBulan[b] || { bulan: b, penerimaan: null, pengeluaran: null, url_detail: null });
                        }

                        document.getElementById('infoKeuangan').textContent = 'Tahun ' + tahun;

                        return rows;
                    },
                    error: function () {
                        document.getElementById('infoKeuangan').textContent = 'Gagal memuat data.';
                    }
                },
                columns: [
                    {
                        data: null,
                        searchable: false,
                        orderable: false,
                        className: 'text-center',
                        width: '40px',
                        defaultContent: ''
                    },
                    {
                        data: 'bulan',
                        render: function (data, type) {
                            // Gunakan angka untuk sort agar urutan 1–12, nama untuk tampilan
                            if (type === 'sort' || type === 'type') return data;
                            return NAMA_BULAN[data] || '-';
                        }
                    },
                    {
                        data: 'penerimaan',
                        className: 'text-right',
                        render: function (data, type) {
                            if (type === 'sort' || type === 'type') return data || 0;
                            return data !== null ? formatRupiah(data) : '-';
                        }
                    },
                    {
                        data: 'pengeluaran',
                        className: 'text-right',
                        render: function (data, type) {
                            if (type === 'sort' || type === 'type') return data || 0;
                            return data !== null ? formatRupiah(data) : '-';
                        }
                    },
                    {
                        data: 'url_detail',
                        className: 'text-center',
                        orderable: false,
                        searchable: false,
                        render: function (data) {
                            return buatTombolDetail(data);
                        }
                    }
                ],
                language: {
                    url: '//cdn.datatables.net/plug-ins/1.13.7/i18n/id.json',
                    emptyTable: 'Tidak ada data keuangan untuk ditampilkan',
                },
                order: [[1, 'asc']],
                pageLength: 12,
                lengthChange: false,
                searching: false,
                info: false,
                paging: false,
                dom: 'rt',
                drawCallback: function (settings) {
                    var api = this.api();
                    var start = api.page.info().start;
                    api.column(0, { page: 'current' }).nodes().each(function (cell, i) {
                        cell.textContent = (start + i + 1) + '.';
                    });
                }
            });
        }

        document.getElementById('filterTahunKeuangan').addEventListener('change', function () {
            initTable(this.value);
        });

        var tahunAwal = document.getElementById('filterTahunKeuangan').value;
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', function () { initTable(tahunAwal); });
        } else {
            initTable(tahunAwal);
        }
    })();
</script>
