<!--
=====================================================
CODE UNTUK JOOMLA 3 - RADIUS BIAYA PERKARA
Copy code ini ke artikel Joomla atau Custom HTML Module
CSS disimpan terpisah di custom.css (prefix rb-)
=====================================================
-->

<div class="rb-wrapper">
    <!-- Loading State -->
    <div class="rb-loading" id="rbLoading">
        <div class="rb-spinner"></div>
        <p>Memuat data Radius Biaya Perkara...</p>
    </div>

    <!-- Error State -->
    <div class="rb-error" id="rbError" style="display:none;">
        <p>Gagal memuat data. Silakan coba lagi nanti.</p>
        <button class="rb-btn rb-btn-primary" onclick="location.reload()">Muat Ulang</button>
    </div>

    <!-- Empty State -->
    <div class="rb-empty" id="rbEmpty" style="display:none;">
        <p>Belum ada data SK Radius Biaya yang tersedia.</p>
    </div>

    <!-- Main Content (hidden until loaded) -->
    <div id="rbContent" style="display:none;">
        <!-- Header -->
        <div class="rb-header" id="rbHeader"></div>

        <!-- SK Document Card -->
        <div class="rb-doc-card" id="rbDocCard" style="display:none;">
            <div class="rb-doc-card-icon">&#128196;</div>
            <div class="rb-doc-card-body">
                <h3>Dokumen SK Asli</h3>
                <p id="rbDocTitle"></p>
                <a href="#" target="_blank" rel="noopener" class="rb-btn rb-btn-outline" id="rbDocLink">Lihat Dokumen Lengkap</a>
            </div>
        </div>

        <!-- Tab Navigation -->
        <div class="rb-tabs" id="rbTabs">
            <button class="rb-tab-btn active" data-tab="tab-dasar-hukum">Dasar Hukum</button>
            <button class="rb-tab-btn" data-tab="tab-ketentuan">Ketentuan Umum</button>
            <button class="rb-tab-btn" data-tab="tab-radius">Klasifikasi Radius</button>
            <button class="rb-tab-btn" data-tab="tab-komponen">Komponen Panjar Biaya</button>
        </div>

        <!-- Tab 1: Dasar Hukum -->
        <div class="rb-tab-pane active" id="tab-dasar-hukum">
            <div id="rbDasarHukum"></div>
        </div>

        <!-- Tab 2: Ketentuan Umum -->
        <div class="rb-tab-pane" id="tab-ketentuan">
            <div id="rbKetentuan"></div>
        </div>

        <!-- Tab 3: Klasifikasi Radius -->
        <div class="rb-tab-pane" id="tab-radius">
            <div class="rb-filter-bar">
                <div class="rb-search">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" class="rb-search-input" id="radiusSearch" placeholder="Cari desa/kelurahan...">
                </div>
                <select class="rb-filter-select" id="kecamatanFilter">
                    <option value="">Semua Kecamatan</option>
                </select>
            </div>
            <div class="rb-table-wrap">
                <table class="rb-table" id="radiusTable">
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Desa / Kelurahan</th>
                            <th>Kecamatan</th>
                            <th>Radius</th>
                            <th class="rb-text-right">Biaya (Rp)</th>
                        </tr>
                    </thead>
                    <tbody id="radiusTableBody"></tbody>
                </table>
            </div>
            <div id="radiusCount" class="rb-count-info"></div>

            <!-- Biaya Lain-lain -->
            <div class="rb-section-title">Biaya Lain-lain</div>
            <div id="rbBiayaLain"></div>
        </div>

        <!-- Tab 4: Komponen Panjar Biaya -->
        <div class="rb-tab-pane" id="tab-komponen">
            <!-- Sub-tabs Manual vs e-Court -->
            <div class="rb-sub-tabs">
                <button class="rb-sub-tab-btn active" data-subtab="manual">Manual</button>
                <button class="rb-sub-tab-btn" data-subtab="ecourt">e-Court</button>
            </div>
            <div class="rb-sub-pane active" id="sub-manual"></div>
            <div class="rb-sub-pane" id="sub-ecourt"></div>
        </div>
    </div>
</div>

<script>
(function () {
    'use strict';

    var API_URL = 'https://web-api.pa-penajam.go.id/api/radius-biaya?active=1';

    var NAMA_RADIUS = {
        'I': 'Radius I',
        'II': 'Radius II',
        'III': 'Radius III',
        'IV': 'Radius IV',
        'IV Khusus': 'Radius IV Khusus'
    };

    function formatRupiah(val) {
        if (val === null || val === undefined || val === '') return '-';
        if (typeof val === 'string' && val.indexOf('Sesuaikan') !== -1) return val;
        if (typeof val === 'string' && val.indexOf('Sesuai') !== -1) return val;
        if (typeof val === 'string' && val.indexOf('Disesuaikan') !== -1) return val;
        var num = Number(val);
        if (isNaN(num)) return val;
        return 'Rp ' + num.toLocaleString('id-ID');
    }

    function isRadiusText(val) {
        return typeof val === 'string' && (val.indexOf('Sesuaikan Radius') !== -1 || val.indexOf('Radius') !== -1);
    }

    // Fetch data
    fetch(API_URL)
        .then(function (res) { return res.json(); })
        .then(function (json) {
            if (!json.success || !json.data || json.data.length === 0) {
                document.getElementById('rbLoading').style.display = 'none';
                document.getElementById('rbEmpty').style.display = 'block';
                return;
            }

            var item = json.data[0];
            if (!item.metadata) {
                document.getElementById('rbLoading').style.display = 'none';
                document.getElementById('rbEmpty').style.display = 'block';
                return;
            }

            renderAll(item);
            document.getElementById('rbLoading').style.display = 'none';
            document.getElementById('rbContent').style.display = 'block';
        })
        .catch(function () {
            document.getElementById('rbLoading').style.display = 'none';
            document.getElementById('rbError').style.display = 'block';
        });

    function renderAll(item) {
        var meta = item.metadata;
        renderHeader(meta);
        renderDocCard(item);
        renderDasarHukum(meta.dasar_hukum);
        renderKetentuan(meta.ketentuan_umum, meta.metadata);
        renderRadius(meta.lampiran_1_klasifikasi_radius);
        renderKomponen(meta.lampiran_2_komponen_panjar_biaya);
        initTabs();
        initSubTabs();
    }

    // === HEADER ===
    function renderHeader(meta) {
        var m = meta.metadata || {};
        var signer = m.ditandatangani_oleh || {};
        var html = '<div class="rb-header-icon">&#9878;</div>';
        html += '<div class="rb-header-body">';
        html += '<h2>' + (m.tentang || 'Panjar Biaya Perkara') + '</h2>';
        html += '<p>' + (m.instansi || '') + '</p>';
        html += '<span class="rb-sk-badge">' + (m.nomor_sk || '') + '</span>';
        html += '</div>';
        html += '<div class="rb-header-stat">';
        html += '<strong>' + (m.tanggal_ditetapkan || '') + '</strong>';
        html += '<span>Tanggal Ditetapkan</span>';
        html += '</div>';
        html += '<div class="rb-header-signer">';
        html += '<span>Ditandatangani oleh:</span>';
        html += '<strong>' + (signer.nama || '') + '</strong>';
        html += '<small>' + (signer.jabatan || '') + '</small>';
        html += '</div>';
        document.getElementById('rbHeader').innerHTML = html;
    }

    // === DOC CARD ===
    function renderDocCard(item) {
        if (!item.file_url) return;
        document.getElementById('rbDocCard').style.display = 'flex';
        document.getElementById('rbDocTitle').textContent = item.tentang || 'Dokumen SK Panjar Biaya Perkara';
        document.getElementById('rbDocLink').href = item.file_url;
    }

    // === DASAR HUKUM ===
    function renderDasarHukum(dh) {
        if (!dh) return;
        var categories = [
            { key: 'undang_undang', label: 'Undang-Undang', icon: '&#9878;' },
            { key: 'peraturan_pemerintah', label: 'Peraturan Pemerintah', icon: '&#9879;' },
            { key: 'perma', label: 'PERMA', icon: '&#9880;' },
            { key: 'sema', label: 'SEMA', icon: '&#9881;' },
            { key: 'kma', label: 'KMA', icon: '&#9882;' },
            { key: 'lainnya', label: 'Lainnya', icon: '&#9883;' }
        ];

        var html = '';
        categories.forEach(function (cat) {
            var items = dh[cat.key];
            if (!items || items.length === 0) return;
            html += '<details class="rb-accordion">';
            html += '<summary><span class="rb-accordion-icon">' + cat.icon + '</span> ' + cat.label + ' <span class="rb-badge-count">' + items.length + '</span></summary>';
            html += '<div class="rb-accordion-body"><ol>';
            items.forEach(function (item) {
                html += '<li>' + item + '</li>';
            });
            html += '</ol></div></details>';
        });
        document.getElementById('rbDasarHukum').innerHTML = html;
    }

    // === KETENTUAN UMUM ===
    function renderKetentuan(ketentuan, metadata) {
        if (!ketentuan) return;
        var labels = ['kesatu', 'kedua', 'ketiga', 'keempat', 'kelima', 'keenam'];
        var html = '<div class="rb-card-grid">';
        labels.forEach(function (key, i) {
            if (ketentuan[key]) {
                html += '<div class="rb-info-card">';
                html += '<span class="rb-info-num">' + (i + 1) + '</span>';
                html += '<p>' + ketentuan[key] + '</p>';
                html += '</div>';
            }
        });
        html += '</div>';

        // Rekening highlight
        if (metadata && metadata.rekening_pembayaran) {
            var rek = metadata.rekening_pembayaran;
            html += '<div class="rb-highlight">';
            html += '<div class="rb-highlight-icon">&#127974;</div>';
            html += '<div class="rb-highlight-body">';
            html += '<strong>Rekening Pembayaran</strong>';
            html += '<p>' + rek.nama_rekening + '</p>';
            html += '<p><code>' + rek.nomor_rekening + '</code> &mdash; ' + rek.bank + '</p>';
            html += '</div></div>';
        }
        document.getElementById('rbKetentuan').innerHTML = html;
    }

    // === KLASIFIKASI RADIUS ===
    var allVillages = [];

    function renderRadius(lampiran) {
        if (!lampiran || !lampiran.kecamatan) return;

        var kecamatanSet = new Set();
        allVillages = [];
        var kecamatanMap = {};

        lampiran.kecamatan.forEach(function (kec) {
            kecamatanSet.add(kec.nama_kecamatan);
            kecamatanMap[kec.nama_kecamatan] = kec;
            kec.wilayah.forEach(function (w) {
                allVillages.push({
                    kelurahan: w.kelurahan_desa,
                    kecamatan: kec.nama_kecamatan,
                    radius: w.radius,
                    biaya: w.biaya
                });
            });
        });

        // Populate filter dropdown
        var selHtml = '<option value="">Semua Kecamatan</option>';
        kecamatanSet.forEach(function (k) {
            selHtml += '<option value="' + k + '">' + k + '</option>';
        });
        document.getElementById('kecamatanFilter').innerHTML = selHtml;

        renderRadiusTable(allVillages);

        // Event listeners
        document.getElementById('radiusSearch').addEventListener('input', filterRadius);
        document.getElementById('kecamatanFilter').addEventListener('change', filterRadius);

        // Biaya lain-lain
        renderBiayaLain(lampiran.biaya_lain_lain);
    }

    function filterRadius() {
        var search = document.getElementById('radiusSearch').value.toLowerCase();
        var kecamatan = document.getElementById('kecamatanFilter').value;

        var filtered = allVillages.filter(function (v) {
            var matchSearch = !search || v.kelurahan.toLowerCase().indexOf(search) !== -1;
            var matchKec = !kecamatan || v.kecamatan === kecamatan;
            return matchSearch && matchKec;
        });

        renderRadiusTable(filtered);
    }

    function renderRadiusTable(data) {
        var badgeClass = {
            'I': 'rb-badge-i',
            'II': 'rb-badge-ii',
            'III': 'rb-badge-iii',
            'IV': 'rb-badge-iv',
            'IV Khusus': 'rb-badge-iv'
        };

        var html = '';
        data.forEach(function (v, i) {
            html += '<tr>';
            html += '<td class="rb-text-center">' + (i + 1) + '</td>';
            html += '<td><strong>' + v.kelurahan + '</strong></td>';
            html += '<td>' + v.kecamatan + '</td>';
            html += '<td><span class="rb-badge ' + (badgeClass[v.radius] || '') + '">' + (NAMA_RADIUS[v.radius] || v.radius) + '</span></td>';
            html += '<td class="rb-text-right rb-currency">' + formatRupiah(v.biaya) + '</td>';
            html += '</tr>';
        });

        document.getElementById('radiusTableBody').innerHTML = html || '<tr><td colspan="5" class="rb-text-center">Tidak ada data</td></tr>';
        document.getElementById('radiusCount').textContent = 'Menampilkan ' + data.length + ' desa/kelurahan';
    }

    function renderBiayaLain(biayaLain) {
        if (!biayaLain) return;
        var html = '<div class="rb-card-grid rb-card-grid-3">';

        if (biayaLain.sewa_mobil_transportasi) {
            var sm = biayaLain.sewa_mobil_transportasi;
            html += '<div class="rb-info-card">';
            html += '<span class="rb-info-num rb-info-num-sm">&#128663;</span>';
            html += '<strong>Sewa Mobil Transportasi</strong>';
            html += '<p>' + sm.keperluan + '</p>';
            html += '<p class="rb-currency">' + formatRupiah(sm.biaya_per_hari) + ' /hari</p>';
            html += '<small>' + sm.keterangan + '</small>';
            html += '</div>';
        }

        if (biayaLain.biaya_e_court !== undefined) {
            html += '<div class="rb-info-card">';
            html += '<span class="rb-info-num rb-info-num-sm">&#9889;</span>';
            html += '<strong>Biaya e-Court</strong>';
            html += '<p class="rb-currency">' + formatRupiah(biayaLain.biaya_e_court) + '</p>';
            html += '</div>';
        }

        if (biayaLain.biaya_surat_tercatat) {
            html += '<div class="rb-info-card">';
            html += '<span class="rb-info-num rb-info-num-sm">&#9993;</span>';
            html += '<strong>Biaya Surat Tercatat</strong>';
            html += '<p>' + biayaLain.biaya_surat_tercatat + '</p>';
            html += '</div>';
        }

        if (biayaLain.biaya_panggilan_umum) {
            var bp = biayaLain.biaya_panggilan_umum;
            html += '<div class="rb-info-card">';
            html += '<span class="rb-info-num rb-info-num-sm">&#128226;</span>';
            html += '<strong>Panggilan Umum</strong>';
            if (bp.via_radio_idc_balikpapan) {
                html += '<p>Via Radio IDC: ' + formatRupiah(bp.via_radio_idc_balikpapan.biaya) + '</p>';
                html += '<small>' + bp.via_radio_idc_balikpapan.keterangan + '</small>';
            }
            if (bp.via_papan_pengumuman) {
                html += '<p>Via Papan Pengumuman: ' + formatRupiah(bp.via_papan_pengumuman.biaya) + '</p>';
            }
            html += '</div>';
        }

        html += '</div>';
        document.getElementById('rbBiayaLain').innerHTML = html;
    }

    // === KOMPONEN PANJAR BIAYA ===
    function renderKomponen(komponen) {
        if (!komponen) return;
        renderKomponenSub(komponen.A_panjar_manual, 'sub-manual', 'manual');
        renderKomponenSub(komponen.B_panjar_elektronik_e_court, 'sub-ecourt', 'ecourt');
    }

    function renderKomponenSub(data, containerId, mode) {
        if (!data) return;
        var html = '';
        var keys = Object.keys(data).filter(function (k) { return k.indexOf('ketentuan') === -1 && k.indexOf('keterangan') === -1; });

        keys.forEach(function (key) {
            var item = data[key];
            var title = key.replace(/^\d+_/, '').replace(/_/g, ' ').toUpperCase();
            html += '<details class="rb-accordion">';
            html += '<summary>' + title;
            if (item.deskripsi) html += ' <small style="color:#94a3b8;font-weight:400;">— ' + item.deskripsi + '</small>';
            html += '</summary>';
            html += '<div class="rb-accordion-body">';
            html += '<table class="rb-table rb-table-sm">';
            html += '<thead><tr><th>Komponen</th><th class="rb-text-right">Biaya (Rp)</th></tr></thead>';
            html += '<tbody>';

            Object.keys(item).forEach(function (k) {
                if (k === 'deskripsi' || k === 'tambahan_cerai_talak' || typeof item[k] === 'object') return;
                var val = item[k];
                var label = k.replace(/_/g, ' ').replace(/\b\w/g, function (l) { return l.toUpperCase(); });
                var valClass = isRadiusText(val) ? 'rb-text-muted' : 'rb-currency';
                html += '<tr><td>' + label + '</td><td class="rb-text-right ' + valClass + '">' + formatRupiah(val) + '</td></tr>';
            });

            // Handle nested tambahan_cerai_talak
            if (item.tambahan_cerai_talak) {
                html += '<tr><td colspan="2" style="font-weight:700;padding-top:12px;color:#1e293b;">Tambahan Cerai Talak:</td></tr>';
                Object.keys(item.tambahan_cerai_talak).forEach(function (tk) {
                    var tval = item.tambahan_cerai_talak[tk];
                    var tlabel = tk.replace(/_/g, ' ').replace(/\b\w/g, function (l) { return l.toUpperCase(); });
                    var tvalClass = isRadiusText(tval) ? 'rb-text-muted' : 'rb-currency';
                    html += '<tr><td>&nbsp;&nbsp;&#8627; ' + tlabel + '</td><td class="rb-text-right ' + tvalClass + '">' + formatRupiah(tval) + '</td></tr>';
                });
            }

            html += '</tbody></table></div></details>';
        });

        // Keterangan khusus
        var ketKey = mode === 'manual' ? 'ketentuan_khusus' : 'keterangan';
        var ketData = data[ketKey];
        if (ketData && Array.isArray(ketData)) {
            html += '<div class="rb-note">';
            html += '<strong>Catatan:</strong><ul>';
            ketData.forEach(function (k) { html += '<li>' + k + '</li>'; });
            html += '</ul></div>';
        }

        document.getElementById(containerId).innerHTML = html;
    }

    // === TAB LOGIC ===
    function initTabs() {
        var tabs = document.querySelectorAll('#rbTabs .rb-tab-btn');
        tabs.forEach(function (tab) {
            tab.addEventListener('click', function () {
                tabs.forEach(function (t) { t.classList.remove('active'); });
                tab.classList.add('active');
                var panes = document.querySelectorAll('.rb-tab-pane');
                panes.forEach(function (p) { p.classList.remove('active'); });
                document.getElementById(tab.dataset.tab).classList.add('active');
            });
        });
    }

    function initSubTabs() {
        var subTabs = document.querySelectorAll('.rb-sub-tab-btn');
        subTabs.forEach(function (tab) {
            tab.addEventListener('click', function () {
                subTabs.forEach(function (t) { t.classList.remove('active'); });
                tab.classList.add('active');
                document.getElementById('sub-manual').classList.toggle('active', tab.dataset.subtab === 'manual');
                document.getElementById('sub-ecourt').classList.toggle('active', tab.dataset.subtab === 'ecourt');
            });
        });
    }
})();
</script>
