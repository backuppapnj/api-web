<style>
    .mediasi-wrapper {
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        color: #334155;
        line-height: 1.6;
        max-width: 1000px;
        margin: 0 auto;
    }

    .mediasi-title {
        text-align: center;
        font-size: 24px;
        font-weight: 800;
        color: #1e293b;
        margin-bottom: 20px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .mediasi-divider {
        border: none;
        border-top: 3px solid #1a56db;
        width: 60px;
        margin: 0 auto 30px auto;
        border-radius: 3px;
    }

    .mediasi-section-divider {
        border: none;
        border-top: 1px solid #e2e8f0;
        margin: 40px 0;
    }

    .mediasi-img-full {
        display: block;
        margin: 20px auto;
        max-width: 100%;
        height: auto;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .mediasi-text {
        text-align: justify;
        font-size: 16px;
        margin-bottom: 25px;
        color: #475569;
    }

    .mediasi-btn-perma {
        display: inline-block;
        background: #1a56db;
        color: #ffffff !important;
        padding: 10px 20px;
        border-radius: 8px;
        text-decoration: none !important;
        font-weight: 600;
        font-size: 14px;
        transition: all 0.2s;
        margin-top: 10px;
        box-shadow: 0 4px 6px -1px rgba(26, 86, 219, 0.2);
    }

    .mediasi-btn-perma:hover {
        background: #1e429f;
        transform: translateY(-2px);
        box-shadow: 0 10px 15px -3px rgba(26, 86, 219, 0.3);
    }

    .dynamic-section-title {
        text-align: center;
        font-size: 20px;
        font-weight: 700;
        color: #1e293b;
        margin: 50px 0 30px 0;
    }

    .tab-container {
        background: #f8fafc;
        padding: 20px;
        border-radius: 16px;
        border: 1px solid #e2e8f0;
    }

    .tabs-nav {
        display: flex;
        gap: 8px;
        margin-bottom: 25px;
        overflow-x: auto;
        padding-bottom: 10px;
        scrollbar-width: thin;
    }

    .mediasi-tab-btn {
        padding: 10px 24px;
        border: 1px solid #e2e8f0;
        background: #ffffff;
        font-weight: 600;
        cursor: pointer;
        color: #64748b;
        border-radius: 10px;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        white-space: nowrap;
        font-size: 14px;
    }

    .mediasi-tab-btn:hover {
        border-color: #1a56db;
        color: #1a56db;
        background: #f0f7ff;
    }

    .mediasi-tab-btn.active {
        background: #1a56db;
        color: #ffffff;
        border-color: #1a56db;
        box-shadow: 0 4px 12px rgba(26, 86, 219, 0.25);
    }

    .mediasi-tab-pane {
        display: none;
        animation: mediasi-slideUp 0.4s ease-out;
    }

    .mediasi-tab-pane.active {
        display: block;
    }

    @keyframes mediasi-slideUp {
        from { opacity: 0; transform: translateY(15px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .sk-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 25px;
    }

    .sk-card {
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 14px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
    }

    .sk-card-header {
        padding: 15px 20px;
        background: #ffffff;
        border-bottom: 1px solid #f1f5f9;
        display: flex;
        align-items: center;
        gap: 12px;
        font-weight: 700;
        color: #334155;
    }

    .sk-badge {
        font-size: 10px;
        padding: 4px 10px;
        border-radius: 20px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    .badge-hakim { background: #dcfce7; color: #166534; }
    .badge-nonhakim { background: #fef9c3; color: #854d0e; }

    .sk-card-body {
        position: relative;
        height: 550px;
        background: #f1f5f9;
    }

    .sk-card-body iframe {
        width: 100%;
        height: 100%;
        border: none;
    }

    .dynamic-banner-item {
        margin-top: 50px;
    }

    .no-data {
        text-align: center;
        padding: 60px 20px;
        color: #94a3b8;
        font-style: italic;
    }

    @media (max-width: 640px) {
        .mediasi-title { font-size: 20px; }
        .mediasi-tab-btn { padding: 8px 16px; font-size: 13px; }
        .sk-card-body { height: 450px; }
        .sk-grid { grid-template-columns: 1fr; }
    }
</style>

<div class="mediasi-wrapper">
    <div id="mediasi-static-content"></div>
    <div id="mediasi-dynamic-content"></div>
</div>

<script>
(function() {
    var API_BASE = 'https://web-api.pa-penajam.go.id';
    var SITE_BASE = 'https://www.pa-penajam.go.id';

    // === STATIC CONTENT (dirender via JS agar Joomla tidak merewrite URL) ===
    var staticEl = document.getElementById('mediasi-static-content');
    staticEl.innerHTML = '<h1 class="mediasi-title">Prosedur Mediasi</h1>' +
        '<div class="mediasi-divider"></div>' +
        '<div id="img-alur-container" style="text-align:center;margin:20px 0"></div>' +
        '<div class="mediasi-text">' +
            'Mediasi adalah cara penyelesaian sengketa melalui proses perundingan untuk memperoleh kesepakatan Para Pihak dengan dibantu oleh Mediator. Mediasi merupakan cara penyelesaian sengketa secara damai yang tepat, efektif, dan dapat membuka akses yang lebih luas kepada Para Pihak untuk memperoleh penyelesaian yang memuaskan serta berkeadilan.' +
            '<br><br>' +
            'Semua sengketa perdata yang diajukan ke Pengadilan termasuk perkara perlawanan (verzet) atas putusan verstek dan perlawanan pihak berperkara (partij verzet) maupun pihak ketiga (derden verzet) terhadap pelaksanaan putusan yang telah berkekuatan hukum tetap, wajib terlebih dahulu diupayakan penyelesaian melalui Mediasi, kecuali ditentukan lain berdasarkan Peraturan Mahkamah Agung Nomor 1 Tahun 2016.' +
            '<br><br>' +
            'Jasa Mediator Hakim dan Pegawai Pengadilan tidak dikenakan biaya. Sedangkan biaya jasa Mediator nonhakim dan bukan Pegawai Pengadilan ditanggung bersama atau berdasarkan kesepakatan Para Pihak.' +
            '<br><br>' +
            '<a href="' + SITE_BASE + '/images/artikel/perma_mediasi_pengadilan_web.pdf" target="_blank" class="mediasi-btn-perma">&#128196; Baca PERMA Nomor 1 Tahun 2016</a>' +
        '</div>' +
        '<hr class="mediasi-section-divider" />' +
        '<h2 class="dynamic-section-title">Brosur Mediasi</h2>' +
        '<div id="img-brosur1-container" style="text-align:center;margin:20px 0"></div>' +
        '<div id="img-brosur2-container" style="text-align:center;margin:20px 0"></div>';

    // Set gambar via JS (menghindari Joomla rewrite src)
    var imgAlur = document.createElement('img');
    imgAlur.src = SITE_BASE + '/images/banners/Capture_prosedur_mediasi.PNG';
    imgAlur.alt = 'Alur Prosedur Mediasi';
    imgAlur.className = 'mediasi-img-full';
    document.getElementById('img-alur-container').appendChild(imgAlur);

    var imgBrosur1 = document.createElement('img');
    imgBrosur1.src = SITE_BASE + '/images/WhatsApp_Image_2025-11-07_at_12.23.08.jpeg';
    imgBrosur1.alt = 'Brosur Mediasi Hal 1';
    imgBrosur1.className = 'mediasi-img-full';
    document.getElementById('img-brosur1-container').appendChild(imgBrosur1);

    var imgBrosur2 = document.createElement('img');
    imgBrosur2.src = SITE_BASE + '/images/WhatsApp_Image_2025-11-07_at_12.23.08_1.jpeg';
    imgBrosur2.alt = 'Brosur Mediasi Hal 2';
    imgBrosur2.className = 'mediasi-img-full';
    document.getElementById('img-brosur2-container').appendChild(imgBrosur2);

    // === DYNAMIC CONTENT ===
    var dynamicEl = document.getElementById('mediasi-dynamic-content');
    dynamicEl.innerHTML = '<hr class="mediasi-section-divider" />' +
        '<h2 class="dynamic-section-title">Keputusan Ketua Pengadilan Tentang Mediator</h2>' +
        '<div id="sk-section" class="tab-container">' +
            '<div id="sk-tahun-tabs" class="tabs-nav"><div style="padding:10px;color:#94a3b8">Memuat data...</div></div>' +
            '<div id="sk-content-area"></div>' +
        '</div>' +
        '<div id="mediator-banners-section"></div>';

    // === FETCH SK DATA ===
    fetch(API_BASE + '/api/mediasi-sk')
        .then(function(r) { return r.json(); })
        .then(function(json) {
            var items = json.data || [];
            if (items.length === 0) {
                document.getElementById('sk-tahun-tabs').innerHTML = '<div class="no-data">Belum tersedia data SK digital.</div>';
                return;
            }

            items.sort(function(a, b) { return b.tahun - a.tahun; });

            var navHtml = '';
            items.forEach(function(item, idx) {
                var cls = idx === 0 ? 'mediasi-tab-btn active' : 'mediasi-tab-btn';
                navHtml += '<button class="' + cls + '" data-tahun="' + item.tahun + '">' + item.tahun + '</button>';
            });
            document.getElementById('sk-tahun-tabs').innerHTML = navHtml;

            var contentArea = document.getElementById('sk-content-area');
            items.forEach(function(item, idx) {
                var pane = document.createElement('div');
                pane.id = 'pane-' + item.tahun;
                pane.className = idx === 0 ? 'mediasi-tab-pane active' : 'mediasi-tab-pane';

                var grid = document.createElement('div');
                grid.className = 'sk-grid';

                // Card Hakim
                var cardHakim = document.createElement('div');
                cardHakim.className = 'sk-card';
                cardHakim.innerHTML = '<div class="sk-card-header"><span class="sk-badge badge-hakim">Hakim</span><span>SK Mediator Hakim ' + item.tahun + '</span></div>';
                var bodyHakim = document.createElement('div');
                bodyHakim.className = 'sk-card-body';
                if (item.link_sk_hakim) {
                    var iframeH = document.createElement('iframe');
                    iframeH.src = processDocUrl(item.link_sk_hakim);
                    iframeH.setAttribute('allowfullscreen', 'true');
                    bodyHakim.appendChild(iframeH);
                } else {
                    bodyHakim.innerHTML = '<div class="no-data">Berkas Belum Diunggah</div>';
                }
                cardHakim.appendChild(bodyHakim);
                grid.appendChild(cardHakim);

                // Card Non-Hakim
                var cardNon = document.createElement('div');
                cardNon.className = 'sk-card';
                cardNon.innerHTML = '<div class="sk-card-header"><span class="sk-badge badge-nonhakim">Umum</span><span>SK Mediator Non-Hakim ' + item.tahun + '</span></div>';
                var bodyNon = document.createElement('div');
                bodyNon.className = 'sk-card-body';
                if (item.link_sk_non_hakim) {
                    var iframeN = document.createElement('iframe');
                    iframeN.src = processDocUrl(item.link_sk_non_hakim);
                    iframeN.setAttribute('allowfullscreen', 'true');
                    bodyNon.appendChild(iframeN);
                } else {
                    bodyNon.innerHTML = '<div class="no-data">Berkas Belum Diunggah</div>';
                }
                cardNon.appendChild(bodyNon);
                grid.appendChild(cardNon);

                pane.appendChild(grid);
                contentArea.appendChild(pane);
            });

            // Tab click handlers
            document.getElementById('sk-tahun-tabs').addEventListener('click', function(e) {
                var btn = e.target;
                if (!btn.classList.contains('mediasi-tab-btn')) return;
                var tahun = btn.getAttribute('data-tahun');
                var allBtns = document.querySelectorAll('.mediasi-tab-btn');
                for (var i = 0; i < allBtns.length; i++) allBtns[i].classList.remove('active');
                btn.classList.add('active');
                var allPanes = document.querySelectorAll('.mediasi-tab-pane');
                for (var j = 0; j < allPanes.length; j++) allPanes[j].classList.remove('active');
                document.getElementById('pane-' + tahun).classList.add('active');
            });
        })
        .catch(function() {
            document.getElementById('sk-tahun-tabs').innerHTML = '<div class="no-data" style="color:#ef4444">Gagal memuat data SK dari server.</div>';
        });

    // === FETCH BANNER DATA ===
    fetch(API_BASE + '/api/mediator-banners')
        .then(function(r) { return r.json(); })
        .then(function(json) {
            var banners = json.data || [];
            var container = document.getElementById('mediator-banners-section');
            banners.forEach(function(b) {
                var wrapper = document.createElement('div');
                wrapper.className = 'dynamic-banner-item';

                var hr = document.createElement('hr');
                hr.className = 'mediasi-section-divider';
                wrapper.appendChild(hr);

                var title = document.createElement('h2');
                title.className = 'dynamic-section-title';
                title.textContent = b.judul;
                wrapper.appendChild(title);

                var img = document.createElement('img');
                img.src = b.image_url;
                img.alt = b.judul;
                img.className = 'mediasi-img-full';
                wrapper.appendChild(img);

                container.appendChild(wrapper);
            });
        });

    // === HELPER: Format URL dengan benar ===
    function processDocUrl(url) {
        if (!url) return '';
        // Google Drive: pastikan mode preview
        if (url.indexOf('drive.google.com/file/d/') >= 0) {
            return url.replace('/view?usp=sharing', '/preview').replace('/view', '/preview');
        }
        // Path relatif dari storage/uploads API 
        if (url.indexOf('/storage/') === 0 || url.indexOf('/uploads/') === 0) {
            return API_BASE + url;
        }
        // Bersihkan double domain jika terjadi
        var lastHttps = url.lastIndexOf('https://');
        if (lastHttps > 0) {
            return url.substring(lastHttps);
        }
        return url;
    }
})();
</script>
