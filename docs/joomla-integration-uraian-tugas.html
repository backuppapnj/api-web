<style>
/* ===== BASE ===== */
.ut-wrapper { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 1200px; margin: 0 auto; }
.ut-title { text-align: center; font-size: 1.5rem; font-weight: 700; color: #1e293b; margin-bottom: 0.5rem; }
.ut-divider { border: 0; height: 3px; background: linear-gradient(90deg, transparent, #0d9488, transparent); margin-bottom: 1.5rem; }

/* ===== TOOLBAR & SEARCH ===== */
.ut-toolbar { display: flex; flex-wrap: wrap; gap: 1rem; align-items: center; margin-bottom: 1.5rem; }
.ut-search-box { display: flex; align-items: center; gap: 0.5rem; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 0.5rem 0.75rem; flex: 1; min-width: 220px; }
.ut-search-input { border: none; background: transparent; outline: none; font-size: 0.9rem; width: 100%; color: #334155; }

/* ===== TABS ===== */
.ut-tabs-nav { display: flex; gap: 0.5rem; flex-wrap: wrap; }
.ut-tab-btn { padding: 0.5rem 1rem; border: 1px solid #e2e8f0; background: #ffffff; border-radius: 20px; cursor: pointer; font-size: 0.85rem; color: #64748b; transition: all 0.2s; }
.ut-tab-btn:hover { border-color: #0d9488; color: #0d9488; }
.ut-tab-btn.active { background: #0d9488; color: #ffffff; border-color: #0d9488; }
.ut-tab-pane { display: none; }
.ut-tab-pane.active { display: block; }

/* ===== GRID & CARDS ===== */
.ut-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
.ut-card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 1.25rem; text-align: center; transition: box-shadow 0.2s, transform 0.2s; position: relative; }
.ut-card:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.08); transform: translateY(-2px); }
.ut-avatar { width: 64px; height: 64px; border-radius: 50%; object-fit: cover; margin: 0 auto 0.75rem; display: block; }
.ut-avatar-initials { width: 64px; height: 64px; border-radius: 50%; background: linear-gradient(135deg, #0d9488, #14b8a6); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.1rem; margin: 0 auto 0.75rem; }
.ut-card-nama { font-weight: 700; color: #1e293b; font-size: 0.95rem; margin-bottom: 0.25rem; }
.ut-card-nama-tba { font-weight: 600; color: #94a3b8; font-size: 0.9rem; margin-bottom: 0.25rem; font-style: italic; }
.ut-card-jabatan { color: #64748b; font-size: 0.8rem; margin-bottom: 0.5rem; }
.ut-badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 12px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; margin-bottom: 0.5rem; }
.ut-badge-PNS { background: #dbeafe; color: #1e40af; }
.ut-badge-PPNPN { background: #fef3c7; color: #92400e; }
.ut-badge-CASN { background: #d1fae5; color: #065f46; }
.ut-btn-download { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.4rem 0.8rem; background: #f1f5f9; color: #334155; border-radius: 6px; font-size: 0.75rem; text-decoration: none; transition: background 0.2s; }
.ut-btn-download:hover { background: #e2e8f0; }
.ut-card.has-detail { cursor: pointer; }
.ut-card.has-detail::after { content: ''; position: absolute; top: 12px; right: 12px; width: 8px; height: 8px; background: #0d9488; border-radius: 50%; }
.ut-no-data { text-align: center; color: #94a3b8; padding: 40px; font-size: 0.9rem; }

/* ===== SKELETON ===== */
.ut-skeleton-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
.ut-skeleton-card { height: 180px; background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: ut-skeleton 1.2s infinite; border-radius: 12px; }
@keyframes ut-skeleton { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* ===== MODAL ===== */
.ut-modal-overlay { display: none !important; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 9999; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
.ut-modal-overlay.active { display: flex !important; }
.ut-modal { background: #ffffff; border-radius: 16px; max-width: 800px; width: 100%; max-height: 85vh; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,0.3); animation: ut-modalIn 0.25s ease-out; }
@keyframes ut-modalIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
.ut-modal-header { display: flex; justify-content: space-between; align-items: center; padding: 18px 24px; border-bottom: 1px solid #e2e8f0; }
.ut-modal-title { font-size: 17px; font-weight: 700; color: #1e293b; }
.ut-modal-close { background: none; border: none; cursor: pointer; padding: 4px; color: #64748b; transition: color 0.2s; }
.ut-modal-close:hover { color: #0f766e; }
.ut-modal-body { padding: 0; overflow-y: auto; font-size: 14px; line-height: 1.7; color: #334155; }

/* ===== MODAL CONTENT STYLING ===== */
.ut-detail { padding: 24px; }
.ut-meta { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 16px 20px; margin-bottom: 20px; }
.ut-meta p { margin: 0 0 6px 0; font-size: 13px; color: #475569; }
.ut-meta p:last-child { margin-bottom: 0; }
.ut-meta strong { color: #1e293b; }
.ut-section { margin-bottom: 24px; }
.ut-section:last-child { margin-bottom: 0; }
.ut-section h4 { font-size: 15px; font-weight: 700; color: #0f766e; margin: 0 0 10px 0; padding-bottom: 6px; border-bottom: 2px solid #ccfbf1; }
.ut-section p { margin: 0 0 10px 0; text-align: justify; }
.ut-section ol { margin: 0; padding-left: 22px; }
.ut-section ol li { margin-bottom: 8px; padding-left: 4px; }
.ut-section ol li:last-child { margin-bottom: 0; }
.ut-tambahan { background: #fffbeb; border: 1px solid #fef3c7; border-radius: 10px; padding: 16px 20px; }
.ut-tambahan h4 { color: #92400e; border-bottom-color: #fde68a; }
.ut-dasar { font-size: 12px; color: #78716c; margin-bottom: 10px; font-style: italic; }
.ut-modal-body h1, .ut-modal-body h2, .ut-modal-body h3 { margin-top: 0; color: #1e293b; }
.ut-modal-body ul, .ut-modal-body ol { padding-left: 20px; }
.ut-modal-body a { color: #0d9488; text-decoration: underline; }

/* ===== SCROLL LOCK ===== */
.ut-no-scroll { overflow: hidden !important; }
</style>

<div class="ut-wrapper">
    <h2 class="ut-title">Uraian Tugas</h2>
    <hr class="ut-divider" />

    <!-- Toolbar: Search -->
    <div class="ut-toolbar">
        <div class="ut-search-box">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <input
                id="ut-search"
                type="text"
                class="ut-search-input"
                placeholder="Cari nama atau jabatan..."
                oninput="utFilterCards()"
            />
        </div>
        <!-- Tab navigasi (diisi dinamis) -->
        <div class="ut-tabs-nav" id="ut-tabs-nav"></div>
    </div>

    <!-- Loading skeleton -->
    <div id="ut-loading" class="ut-skeleton-grid">
        <div class="ut-skeleton-card"></div>
        <div class="ut-skeleton-card"></div>
        <div class="ut-skeleton-card"></div>
        <div class="ut-skeleton-card"></div>
        <div class="ut-skeleton-card"></div>
        <div class="ut-skeleton-card"></div>
    </div>

    <!-- Tab konten (diisi dinamis) -->
    <div id="ut-tab-content"></div>

    <!-- Modal Uraian Tugas -->
    <div class="ut-modal-overlay" id="ut-modal-overlay" onclick="utCloseModal(event)">
        <div class="ut-modal">
            <div class="ut-modal-header">
                <span class="ut-modal-title" id="ut-modal-title">Uraian Tugas</span>
                <button class="ut-modal-close" onclick="utCloseModalDirect()">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M18 6 6 18M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="ut-modal-body" id="ut-modal-body"></div>
        </div>
    </div>
</div>

<script>
(function () {
    // Ganti dengan URL API yang sesuai
    var API_BASE = 'https://api.pa-penajam.go.id/api';

    var allData = [];
    var kelompokList = [];
    var activeTabId = 'all';

    // Ambil data dari API
    function utInit() {
        Promise.all([
            fetch(API_BASE + '/kelompok-jabatan').then(r => r.json()),
            fetch(API_BASE + '/uraian-tugas').then(r => r.json())
        ]).then(function (results) {
            var kelRes = results[0];
            var dataRes = results[1];

            if (kelRes.success) kelompokList = kelRes.data || [];
            if (dataRes.success) allData = dataRes.data || [];

            document.getElementById('ut-loading').style.display = 'none';
            utBuildTabs();
            utRenderAll();
        }).catch(function () {
            document.getElementById('ut-loading').innerHTML =
                '<p style="text-align:center;color:#ef4444;padding:40px">Gagal memuat data. Coba muat ulang halaman.</p>';
        });
    }

    // Bangun tab navigasi
    function utBuildTabs() {
        var nav = document.getElementById('ut-tabs-nav');
        var content = document.getElementById('ut-tab-content');

        // Tab "Semua"
        nav.innerHTML = '<button class="ut-tab-btn active" onclick="utSwitchTab(\'all\')" id="ut-tab-btn-all">Semua</button>';

        kelompokList.forEach(function (k) {
            var btn = document.createElement('button');
            btn.className = 'ut-tab-btn';
            btn.id = 'ut-tab-btn-' + k.id;
            btn.textContent = k.nama_kelompok;
            btn.setAttribute('onclick', 'utSwitchTab(' + k.id + ')');
            nav.appendChild(btn);

            var pane = document.createElement('div');
            pane.className = 'ut-tab-pane';
            pane.id = 'ut-pane-' + k.id;
            content.appendChild(pane);
        });

        // Pane "Semua"
        var paneAll = document.createElement('div');
        paneAll.className = 'ut-tab-pane active';
        paneAll.id = 'ut-pane-all';
        content.prepend(paneAll);
    }

    // Render semua card ke tab yang sesuai
    function utRenderAll() {
        // Kosongkan semua pane
        document.querySelectorAll('.ut-tab-pane').forEach(function (p) { p.innerHTML = ''; });

        var query = document.getElementById('ut-search').value.toLowerCase().trim();

        // Filter data berdasarkan query
        var filtered = query
            ? allData.filter(function (d) {
                return (d.nama || '').toLowerCase().includes(query)
                    || (d.jabatan || '').toLowerCase().includes(query);
              })
            : allData;

        // Render ke pane "all"
        utRenderPane('ut-pane-all', filtered);

        // Render ke pane per kelompok
        kelompokList.forEach(function (k) {
            var subset = filtered.filter(function (d) { return d.kelompok_jabatan_id == k.id; });
            utRenderPane('ut-pane-' + k.id, subset);
        });
    }

    // Render daftar card ke satu pane
    function utRenderPane(paneId, items) {
        var pane = document.getElementById(paneId);
        if (!pane) return;

        if (!items || items.length === 0) {
            pane.innerHTML = '<div class="ut-no-data">Tidak ada data.</div>';
            return;
        }

        var grid = document.createElement('div');
        grid.className = 'ut-grid';

        items.forEach(function (item) {
            grid.appendChild(utMakeCard(item));
        });

        pane.appendChild(grid);
    }

    // Buat satu card pegawai
    function utMakeCard(item) {
        var hasDetail = !!(item.uraian_tugas && item.uraian_tugas.trim());
        var card = document.createElement('div');
        card.className = 'ut-card' + (hasDetail ? ' has-detail' : '');
        card.setAttribute('data-nama', (item.nama || '').toLowerCase());
        card.setAttribute('data-jabatan', (item.jabatan || '').toLowerCase());

        var fotoHtml = '';
        if (item.foto_url) {
            fotoHtml = '<img src="' + escHtml(item.foto_url) + '" alt="' + escHtml(item.nama || item.jabatan) + '" class="ut-avatar" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\'" />'
                     + '<div class="ut-avatar-initials" style="display:none">' + utInitials(item.nama || item.jabatan) + '</div>';
        } else {
            fotoHtml = '<div class="ut-avatar-initials">' + utInitials(item.nama || item.jabatan) + '</div>';
        }

        var namaHtml = item.nama
            ? '<div class="ut-card-nama">' + escHtml(item.nama) + '</div>'
            : '<div class="ut-card-nama-tba">— Belum Terisi —</div>';

        var badgeHtml = item.jenis_pegawai
            ? '<span class="ut-badge ut-badge-' + escHtml(item.jenis_pegawai.nama) + '">' + escHtml(item.jenis_pegawai.nama) + '</span>'
            : '';

        var btnHtml = item.link_dokumen
            ? '<a href="' + escHtml(item.link_dokumen) + '" target="_blank" rel="noopener noreferrer" class="ut-btn-download" onclick="event.stopPropagation();">'
              + '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>'
              + 'Download</a>'
            : '';

        card.innerHTML = fotoHtml
            + namaHtml
            + '<div class="ut-card-jabatan">' + escHtml(item.jabatan) + '</div>'
            + badgeHtml
            + btnHtml;

        // Attach click handler AFTER innerHTML so it persists on the card element
        if (hasDetail) {
            card.addEventListener('click', function(e) {
                // Don't open modal if clicking a link or button inside
                if (e.target.closest('a')) return;
                utOpenModal(item);
            });
        }

        return card;
    }

    // Pindahkan modal overlay ke <body> agar position:fixed tidak ter-clip
    // oleh overflow:hidden / transform milik kontainer Joomla
    function utMoveModalToBody() {
        var overlay = document.getElementById('ut-modal-overlay');
        if (overlay && overlay.parentNode !== document.body) {
            document.body.appendChild(overlay);
        }
    }

    // Modal functions
    function utOpenModal(item) {
        utMoveModalToBody(); // pastikan overlay ada di <body>
        document.getElementById('ut-modal-title').textContent = 'Uraian Tugas \u2014 ' + (item.nama || item.jabatan);
        document.getElementById('ut-modal-body').innerHTML = item.uraian_tugas;
        document.getElementById('ut-modal-overlay').classList.add('active');
        // Gunakan class daripada inline style agar tidak bentrok dengan CSS Joomla
        document.documentElement.classList.add('ut-no-scroll');
        document.body.classList.add('ut-no-scroll');
    }

    function utCloseModalDirect() {
        document.getElementById('ut-modal-overlay').classList.remove('active');
        document.documentElement.classList.remove('ut-no-scroll');
        document.body.classList.remove('ut-no-scroll');
    }

    function utCloseModal(event) {
        if (event.target.id === 'ut-modal-overlay') {
            utCloseModalDirect();
        }
    }

    // Pindah tab
    function utSwitchTab(tabId) {
        activeTabId = tabId;

        // Update tombol aktif
        document.querySelectorAll('.ut-tab-btn').forEach(function (b) { b.classList.remove('active'); });
        var activeBtn = document.getElementById('ut-tab-btn-' + tabId);
        if (activeBtn) activeBtn.classList.add('active');

        // Update pane aktif
        document.querySelectorAll('.ut-tab-pane').forEach(function (p) { p.classList.remove('active'); });
        var activePane = document.getElementById('ut-pane-' + tabId);
        if (activePane) activePane.classList.add('active');
    }

    // Filter berdasarkan pencarian
    function utFilterCards() {
        utRenderAll();
        // Tetap di tab yang aktif sekarang
        document.querySelectorAll('.ut-tab-pane').forEach(function (p) { p.classList.remove('active'); });
        var pane = document.getElementById('ut-pane-' + activeTabId);
        if (pane) pane.classList.add('active');
    }

    // Ambil inisial nama (maks 2 huruf)
    function utInitials(name) {
        if (!name) return '?';
        var parts = name.trim().split(/\s+/);
        if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
        return parts[0].substring(0, 2).toUpperCase();
    }

    // Escape HTML untuk keamanan
    function escHtml(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    // Ekspos fungsi ke scope global untuk event handler inline
    window.utSwitchTab = utSwitchTab;
    window.utFilterCards = utFilterCards;
    window.utCloseModal = utCloseModal;
    window.utCloseModalDirect = utCloseModalDirect;

    // Pindahkan modal ke body lebih awal (sebelum data dimuat)
    // untuk menghindari masalah positioning di Joomla
    document.addEventListener('DOMContentLoaded', utMoveModalToBody);
    // Fallback jika DOMContentLoaded sudah lewat
    if (document.readyState !== 'loading') utMoveModalToBody();

    // Mulai
    utInit();
})();
</script>
